server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip the text-ish assets vite emits (JS/CSS bundles, source maps)
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # cache hashed static assets aggressively; index.html must always
    # revalidate so a new deploy is picked up on next load
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
