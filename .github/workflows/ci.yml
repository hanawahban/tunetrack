name: ci

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 11.13.0
  BUN_VERSION: 1.3.14
  NODE_VERSION: 24

jobs:
  api:
    runs-on: ubuntu-latest
    # tests use pglite (in-memory), so no real DATABASE_URL is needed -- but
    # the jwt plugin throws on an empty secret at app-construction time, so
    # this is required just to build the app, not a real credential
    env:
      JWT_SECRET: test-secret
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: install (api only)
        run: pnpm install --frozen-lockfile --filter api...

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: typecheck
        working-directory: api
        run: pnpm run typecheck

      - name: test
        working-directory: api
        run: pnpm run test

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: install (web only)
        run: pnpm install --frozen-lockfile --filter web...

      - name: lint
        working-directory: web
        run: pnpm run lint

      - name: "build (includes typecheck: tsc -b, then vite build)"
        working-directory: web
        run: pnpm run build

      - name: test
        working-directory: web
        run: pnpm run test
