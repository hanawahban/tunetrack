name: tmp-verify-docker

on:
  push:
    branches: [48-dockerize]
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: docker compose up --build
        run: docker compose up --build -d

      - name: wait for api
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/docs/json > /dev/null; then
              echo "api up"; exit 0
            fi
            sleep 2
          done
          echo "api never came up"; exit 1

      - name: wait for web
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173/ > /dev/null; then
              echo "web up"; exit 0
            fi
            sleep 2
          done
          echo "web never came up"; exit 1

      - name: seed test accounts
        run: docker compose run --rm --entrypoint bun migrate src/db/seed.ts

      - name: login smoke test (against the containerized api)
        run: |
          set -e
          body=$(curl -sf -X POST http://localhost:3000/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"listener@test.com","password":"password123"}')
          echo "$body" | grep -q '"access_token"' || (echo "no access_token in response: $body"; exit 1)
          echo "login OK"

      - name: image sizes
        if: always()
        run: docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" | grep -E "tunetrack|REPOSITORY"

      - name: logs on failure
        if: failure()
        run: docker compose logs

      - name: tear down
        if: always()
        run: docker compose down -v
